services:
  backend:
    build:
      context: .
    container_name: go-single
    ports:
      - "${BACKEND_PORT}:8080"
    environment:
      DB_HOST: $DB_HOST
      DB_PORT: $DB_PORT
      DB_USER: $DB_USER
      DB_PASS: $DB_PASS
      DB_NAME: $DB_NAME
      JWT_TOKEN: $JWT_TOKEN
      S3_BUCKET_NAME: $S3_BUCKET_NAME
      AWS_REGION: $AWS_REGION
      AWS_ACCESS_KEY_ID: $AWS_ACCESS_KEY_ID
      AWS_SECRET_ACCESS_KEY: $AWS_SECRET_ACCESS_KEY