services:
  backend:
    build:
      context: ./backend
    container_name: go
    ports:
      - "${BACKEND_PORT}:8080"
    environment:
      DB_HOST: $DB_HOST
      DB_PORT: $DB_PORT
      DB_USER: $DB_USER
      DB_PASS: $DB_PASS
      DB_NAME: $DB_NAME
      JWT_TOKEN: $JWT_TOKEN
      S3_BUCKET_NAME: $S3_BUCKET_NAME
      AWS_REGION: $AWS_REGION
      AWS_ACCESS_KEY_ID: $AWS_ACCESS_KEY_ID
      AWS_SECRET_ACCESS_KEY: $AWS_SECRET_ACCESS_KEY
    # depends_on:
    #   - database
    # restart: always

  frontend:
    build:
      context: ./frontend
    container_name: sveltekit
    ports:
      - "${FRONTEND_PORT}:3000"
    environment:
      - VITE_API_URL=$VITE_API_URL
    depends_on:
      - backend
    # restart: always

  pgadmin:
    image: dpage/pgadmin4:9.13
    container_name: pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: $PGADMIN_DEFAULT_EMAIL
      PGADMIN_DEFAULT_PASSWORD: $PGADMIN_DEFAULT_PASSWORD
    ports:
      - "${PGADMIN_PORT}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin/data
    # restart: always

volumes:
  postgres_data:
  pgadmin_data:
