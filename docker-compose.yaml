services:
  backend:
    build: 
      context: ./backend
    ports:
      - "8080:8080"
    depends_on:
      - database

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
  
  database:
    image: postgres:17-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: atom
      POSTGRES_PASSWORD: '1234'
      POSTGRES_DB: tododb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  postgres_data: